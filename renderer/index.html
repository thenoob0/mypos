<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>POS Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-100 to-gray-200 font-sans">

<div class="flex h-screen gap-4 p-4">

  <!-- LEFT PANEL -->
  <div class="w-2/3 flex flex-col gap-4">
    <h1 class="text-3xl font-bold text-gray-800">United Shoes</h1>


    <!-- TOP BAR -->
    <div class="bg-white p-4 rounded-2xl shadow flex gap-3">
      <button onclick="goToReports()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white text-lg py-3 rounded-xl font-semibold">Reports</button>
      <button onclick="goToAddProduct()" class="flex-1 bg-purple-600 hover:bg-purple-700 text-white text-lg py-3 rounded-xl font-semibold">Add Product</button>
      <button onclick="goToProducts()" class="flex-1 bg-red-600 hover:bg-red-700 text-white text-lg py-3 rounded-xl font-semibold">Product List</button>
      <button 
      onclick="goToInvoices()" 
      class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white text-lg py-3 rounded-xl font-semibold">
      Invoices
      </button>
    </div>

    <!-- SEARCH BAR -->
    <div class="bg-white p-5 rounded-2xl shadow">
      <input 
        id="searchInput"
        class="w-full p-6 text-3xl border rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-300"
        placeholder="🔍 Scan barcode or search product..."
        autofocus
      />
      
    </div>

    <!-- ITEMS LIST -->
    <div class="bg-white flex-1 p-4 rounded-2xl shadow overflow-y-auto">
      <div id="items" class="space-y-3"></div>
    </div>

  </div>

  <!-- RIGHT PANEL -->
  <div class="w-1/3 bg-white rounded-2xl shadow flex flex-col justify-between p-6">

    <div class="space-y-6">

      <!-- SUBTOTAL -->
      <div class="bg-gray-50 p-4 rounded-xl">
        <div class="text-gray-500 text-lg">Subtotal</div>
        <div id="subtotal" class="text-4xl font-bold">0</div>
      </div>

      <!-- DISCOUNT -->
      <div class="bg-gray-50 p-4 rounded-xl">
        <div class="text-gray-500 text-lg">Discount</div>

        <div class="flex gap-2 mt-3">
          <input 
            id="discountInput"
            type="number"
            placeholder="0"
            class="border p-4 text-xl w-full rounded-lg"
            oninput="handleDiscountInput()"
          />

          <select 
            id="discountType"
            class="border p-4 text-lg rounded-lg"
            onchange="handleDiscountInput()"
          >
            <option value="fixed">Rs</option>
            <option value="percent">%</option>
          </select>
        </div>

        <div class="mt-3 text-gray-600 text-lg">
          Discount: <span id="discount" class="font-bold">0</span>
        </div>
      </div>

      <!-- TOTAL -->
      <div class="bg-green-100 p-6 rounded-2xl text-center shadow-inner">
        <div class="text-gray-600 text-xl">TOTAL</div>
        <div id="total" class="text-6xl font-extrabold text-green-700">0</div>
      </div>

    </div>

    <!-- PRINT BUTTON -->
    <button 
      onclick="printBill()"
      class="w-full bg-green-600 hover:bg-green-700 text-white text-3xl py-5 rounded-2xl font-bold shadow-lg"
    >
      PRINT (ENTER)
    </button>

  </div>

</div>
<div id="toast" class="fixed top-5 right-5 hidden px-6 py-3 rounded shadow text-white"></div>
<script src="js/toast.js"></script>
<script src="js/billing.js"></script>





</body>
</html>
